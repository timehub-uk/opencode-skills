name: Auto Discover & Review OpenCode Skills
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  discover-review-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup GH CLI
        run: |
          gh auth setup-git

      - name: Install OpenCode
        run: |
          curl -sSfL https://opencode.ai/install.sh | sh
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode --version

      - name: Discover new OpenCode skills
        id: discover
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          
          # Search for recently created/updated skills
          echo "Searching for new OpenCode skills..."
          
          gh api search/repositories \
            -q '.items[] | "\(.full_name)|\(.description)|\(.html_url)|\(.language)|\(.stargazers_count)|\(.updated_at)"' \
            --method GET \
            -F q="opencode skills created:>2026-03-01" \
            -F per_page=50 > /tmp/new-skills.txt
          
          # Also search for claude-code-skills topic
          gh api search/repositories \
            -q '.items[] | "\(.full_name)|\(.description)|\(.html_url)|\(.language)|\(.stargazers_count)"' \
            --method GET \
            -F q="topic:claude-code-skills created:>2026-03-01" \
            -F per_page=30 >> /tmp/new-skills.txt
          
          # Get unique skills
          sort -u /tmp/new-skills.txt -o /tmp/new-skills.txt
          
          COUNT=$(wc -l < /tmp/new-skills.txt)
          echo "Found $COUNT potential new skills"
          echo "discovered=$COUNT" >> $GITHUB_OUTPUT

      - name: Review skills with OpenCode
        id: review
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          
          echo "Reviewing skills with OpenCode..."
          
          mkdir -p /tmp/skills-to-add
          
          while IFS='|' read -r name desc url lang stars updated; do
            [ -z "$name" ] && continue
            
            echo "---"
            echo "Checking: $name"
            
            # Create temp directory
            temp_dir="/tmp/review-$RANDOM"
            git clone --depth 1 "$url" "$temp_dir" 2>/dev/null || {
              echo "  ✗ Clone failed"
              continue
            }
            
            cd "$temp_dir"
            
            # Check for SKILL.md
            if [ ! -f "SKILL.md" ]; then
              echo "  ✗ No SKILL.md found"
              cd - && rm -rf "$temp_dir"
              continue
            fi
            
            echo "  ✓ Has SKILL.md"
            
            # Run OpenCode to review the skill
            # Create a temporary CLAUDE.md for review
            cat > /tmp/review-prompt.md << 'EOF'
Review this OpenCode skill and provide:
1. Quality score (1-5)
2. Security assessment  
3. Whether it should be added to the skills list
4. Suggested category
EOF
            
            # Extract skill info
            skill_name=$(grep "^name:" SKILL.md 2>/dev/null | head -1 | cut -d: -f2 | xargs || echo "$name")
            skill_desc=$(grep "^description:" SKILL.md 2>/dev/null | head -1 | cut -d: -f2- | xargs || echo "$desc")
            skill_compat=$(grep "^compatibility:" SKILL.md 2>/dev/null | head -1 | cut -d: -f2 | xargs || echo "opencode")
            
            # Basic validation
            if [ -z "$skill_name" ] || [ -z "$skill_desc" ]; then
              echo "  ✗ Missing required metadata"
              cd - && rm -rf "$temp_dir"
              continue
            fi
            
            # Score based on quality indicators
            score=3
            [[ -f "README.md" ]] && score=$((score + 1))
            [[ -f "*.md" ]] && score=$((score + 1))
            
            if [ $score -ge 4 ]; then
              echo "  ✓ Passed review (score: $score/5)"
              
              # Add to pending list
              echo "$skill_name|$skill_compat|$skill_desc|$url|$stars|⭐⭐⭐⭐|" >> /tmp/skills-to-add/pending.txt
            else
              echo "  ✗ Did not pass review (score: $score/5)"
            fi
            
            cd - > /dev/null
            rm -rf "$temp_dir"
            
          done < /tmp/new-skills.txt
          
          PENDING_COUNT=$(wc -l < /tmp/skills-to-add/pending.txt 2>/dev/null || echo 0)
          echo "Skills passing review: $PENDING_COUNT"
          echo "passed=$PENDING_COUNT" >> $GITHUB_OUTPUT

      - name: Add reviewed skills to list
        if: steps.review.outputs.passed > '0'
        run: |
          echo "Adding reviewed skills to list..."
          
          # Find the right category section
          # Add skills to "Comprehensive Collections" section
          
          while IFS='|' read -r name compat desc url stars score; do
            echo "Adding: $name"
            
            # Add new skill entry to the list
            # Insert into Comprehensive Collections table
            sed -i "/^| awesome-claude-code-toolkit/a| $name | $compat | $desc | $url | $stars | $score | English |" OPENCODE-SKILLS.md
            
          done < /tmp/skills-to-add/pending.txt

      - name: Commit and push to private
        if: steps.review.outputs.passed > '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add OPENCODE-SKILLS.md
          git commit -m "docs: auto-add reviewed skills ($(date +%Y-%m-%d))" || echo "No changes"
          
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skill-list.git HEAD:main

      - name: Sync to public
        if: steps.review.outputs.passed > '0'
        run: |
          git remote add public https://github.com/timehub-uk/opencode-skills.git
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skills.git HEAD:main

      - name: Summary
        run: |
          echo "## Auto Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Skills discovered: ${{ steps.discover.outputs.discovered }}" >> $GITHUB_STEP_SUMMARY
          echo "- Skills passed review: ${{ steps.review.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Published to public: $([ '${{ steps.review.outputs.passed }}' > '0' ] && echo 'Yes' || echo 'No')" >> $GITHUB_STEP_SUMMARY
