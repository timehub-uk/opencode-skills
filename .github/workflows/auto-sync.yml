name: Auto Sync My Skills
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup GH CLI
        run: |
          gh auth setup-git
          gh auth status

      - name: Get my username
        id: user
        run: |
          echo "MY_USER=$(gh api user --jq '.login')" >> $GITHUB_OUTPUT

      - name: Find my new skills
        id: find
        run: |
          gh api search/repositories \
            -q '.items[] | "\(.full_name)|\(.description)|\(.html_url)|\(.language)|\(.stargazers_count)"' \
            --method GET \
            -F q="user:${{ steps.user.outputs.MY_USER }} skills created:>2026-03-01" \
            -F per_page=20 > /tmp/my-skills.txt
          
          COUNT=$(wc -l < /tmp/my-skills.txt)
          echo "Found $COUNT potential new skills"
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Install OpenCode
        if: steps.find.outputs.count > '0'
        run: |
          # Install OpenCode
          curl -sSfL https://opencode.ai/install.sh | sh
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode --version

      - name: Process skills with OpenCode
        if: steps.find.outputs.count > '0'
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          
          echo "Running OpenCode checks on new skills..."
          
          # For each new skill, run OpenCode to verify/process
          while IFS='|' read -r name desc url lang stars; do
            echo "Processing: $name"
            
            # Clone the skill repo to temp
            temp_dir="/tmp/skill-check-$(date +%s)"
            git clone --depth 1 "$url" "$temp_dir" 2>/dev/null || continue
            
            # Run OpenCode to check the skill
            cd "$temp_dir"
            
            # Check if it has valid SKILL.md
            if [ -f "SKILL.md" ]; then
              echo "✓ $name has SKILL.md"
              
              # Extract skill metadata
              name_line=$(grep "^name:" SKILL.md 2>/dev/null | head -1 || echo "name: unknown")
              desc_line=$(grep "^description:" SKILL.md 2>/dev/null | head -1 || echo "description: unknown")
              
              echo "  - $name_line"
              echo "  - $desc_line"
              
              # Add to skills list
              cd -
              echo "|$name|$lang|$desc|$url|$stars|⭐⭐⭐⭐|" >> OPENCODE-SKILLS.md
            else
              echo "✗ $name - no SKILL.md found"
            fi
            
            rm -rf "$temp_dir"
            cd -
          done < /tmp/my-skills.txt

      - name: Commit and push
        if: steps.find.outputs.count > '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add OPENCODE-SKILLS.md
          git commit -m "docs: auto-sync with OpenCode check - $(date +%Y-%m-%d)" || echo "No changes"
          
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skill-list.git HEAD:main

      - name: Sync to public
        if: steps.find.outputs.count > '0'
        run: |
          git remote add public https://github.com/timehub-uk/opencode-skills.git
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skills.git HEAD:main

      - name: Summary
        run: |
          echo "## Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Username: ${{ steps.user.outputs.MY_USER }}" >> $GITHUB_STEP_SUMMARY
          echo "- Skills found: ${{ steps.find.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- OpenCode checked: Yes" >> $GITHUB_STEP_SUMMARY
          echo "- Public synced: Yes" >> $GITHUB_STEP_SUMMARY
