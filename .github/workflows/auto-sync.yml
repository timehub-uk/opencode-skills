name: Auto Discover & Review OpenCode Skills
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  discover-review-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup GH CLI
        run: gh auth setup-git

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Discover new OpenCode skills
        id: discover
        run: |
          # Search for recently created/updated skills
          gh api search/repositories \
            -q '.items[] | "\(.full_name)"' \
            --method GET \
            -F q="opencode skills created:>2026-03-01" \
            -F per_page=30 > /tmp/skill-repos.txt
          
          gh api search/repositories \
            -q '.items[] | "\(.full_name)"' \
            --method GET \
            -F q="topic:opencode-skills created:>2026-03-01" \
            -F per_page=30 >> /tmp/skill-repos.txt
          
          sort -u /tmp/skill-repos.txt -o /tmp/skill-repos.txt
          
          COUNT=$(wc -l < /tmp/skill-repos.txt)
          echo "Discovered: $COUNT repos"
          echo "discovered=$COUNT" >> $GITHUB_OUTPUT

      - name: Review skills with OpenCode
        id: review
        run: |
          echo "=== OpenCode Review Process ==="
          
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            
            echo "---"
            echo "Reviewing: $repo"
            
            # Get repo details
            REPO_DATA=$(gh api repos/$repo)
            DESC=$(echo "$REPO_DATA" | jq -r '.description // "No description"')
            LANG=$(echo "$REPO_DATA" | jq -r '.language // "Unknown"')
            STARS=$(echo "$REPO_DATA" | jq -r '.stargazers_count')
            
            # Get SKILL.md content via API (no clone!)
            SKILL_CONTENT=$(gh api repos/$repo/contents/SKILL.md 2>/dev/null | jq -r '.content // empty' | base64 -d 2>/dev/null || echo "")
            
            if [ -z "$SKILL_CONTENT" ]; then
              echo "  ✗ No SKILL.md found"
              continue
            fi
            
            echo "  ✓ Has SKILL.md"
            
            # Create review prompt for OpenCode
            cat > /tmp/review-prompt.md << EOF
You are reviewing an OpenCode skill for the skills list.

## Skill: $repo
## Description: $DESC
## Language: $LANG
## Stars: $STARS

## SKILL.md Content:
$SKILL_CONTENT

## Your Task:
Provide a JSON response with this structure:
{
  "name": "skill-name",
  "score": 1-5,
  "quality": "excellent|good|average|poor",
  "security": "safe|concern|unsafe",
  "should_add": true|false,
  "category": "category-name",
  "reason": "why it should/shouldn't be added"
}

Respond ONLY with valid JSON, no other text.
EOF
            
            # Run OpenCode to review (sends prompt to OpenCode)
            # Note: This sends to OpenCode API for analysis
            REVIEW_RESULT=$(cat /tmp/review-prompt.md | opencode --prompt 2>/dev/null || echo '{"should_add":false,"reason":"OpenCode not available"}')
            
            # Check if should be added
            SHOULD_ADD=$(echo "$REVIEW_RESULT" | jq -r '.should_add // false')
            
            if [ "$SHOULD_ADD" = "true" ]; then
              SCORE=$(echo "$REVIEW_RESULT" | jq -r '.score // 3')
              NAME=$(echo "$REVIEW_RESULT" | jq -r '.name // "'$repo'"')
              CATEGORY=$(echo "$REVIEW_RESULT" | jq -r '.category // "Comprehensive Collections"')
              REASON=$(echo "$REVIEW_RESULT" | jq -r '.reason // "Passed review"')
              
              # Convert score to stars
              STARS_DISPLAY=""
              for i in $(seq 1 $SCORE); do STARS_DISPLAY="${STARS_DISPLAY}⭐"; done
              
              echo "  ✓ Passed review (score: $SCORE/5)"
              echo "  Category: $CATEGORY"
              echo "  Reason: $REASON"
              
              # Add to pending list
              echo "$NAME|$LANG|$DESC|https://github.com/$repo|$STARS|$STARS_DISPLAY|Reviewed by OpenCode|" >> /tmp/skills-to-add.txt
            else
              echo "  ✗ Did not pass review"
              REASON=$(echo "$REVIEW_RESULT" | jq -r '.reason // "Failed check"')
              echo "    Reason: $REASON"
            fi
            
          done < /tmp/skill-repos.txt
          
          PENDING_COUNT=$(wc -l < /tmp/skills-to-add.txt 2>/dev/null || echo 0)
          echo "=== Review Complete ==="
          echo "Skills passing review: $PENDING_COUNT"
          echo "passed=$PENDING_COUNT" >> $GITHUB_OUTPUT

      - name: Add reviewed skills to list
        if: steps.review.outputs.passed > '0'
        run: |
          echo "Adding reviewed skills..."
          
          while IFS='|' read -r name lang desc url stars score lang2; do
            [ -z "$name" ] && continue
            echo "Adding: $name"
            
            # Add to Comprehensive Collections
            sed -i "/^| awesome-claude-code-toolkit/a| $name | $lang | $desc | $url | $stars | $score | $lang2 |" OPENCODE-SKILLS.md
            
          done < /tmp/skills-to-add.txt

      - name: Commit and sync
        if: steps.review.outputs.passed > '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add OPENCODE-SKILLS.md
          git commit -m "docs: auto-add OpenCode reviewed skills ($(date +%Y-%m-%d))" || echo "No changes"
          
          # Push to private
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skill-list.git HEAD:main
          
          # Sync to public
          git remote add public https://github.com/timehub-uk/opencode-skills.git 2>/dev/null || true
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skills.git HEAD:main

      - name: Summary
        run: |
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Discovered: ${{ steps.discover.outputs.discovered }}" >> $GITHUB_STEP_SUMMARY
          echo "- Passed OpenCode Review: ${{ steps.review.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Published: Yes" >> $GITHUB_STEP_SUMMARY
