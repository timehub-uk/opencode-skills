name: Auto Sync My Skills
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup GH CLI
        run: |
          gh auth setup-git
          gh auth status

      - name: Get my username
        id: user
        run: |
          echo "MY_USER=$(gh api user --jq '.login')" >> $GITHUB_OUTPUT
          echo "Found my username: ${{ env.MY_USER }}"

      - name: Find my new skills
        id: find
        run: |
          gh api search/repositories \
            -q '.items[] | "\(.full_name)|\(.description)|\(.html_url)|\(.language)|\(.stargazers_count)"' \
            --method GET \
            -F q="user:${{ steps.user.outputs.MY_USER }} skills created:>2026-03-01" \
            -F per_page=20 > /tmp/my-skills.txt
          
          COUNT=$(wc -l < /tmp/my-skills.txt)
          echo "Found $COUNT potential new skills"
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          
          cat /tmp/my-skills.txt

      - name: Update skills list
        if: steps.find.outputs.count > '0'
        run: |
          # For now, just log the skills - manual review recommended
          echo "New skills found:"
          cat /tmp/my-skills.txt
          
          # You can add logic here to auto-add skills to the markdown
          # For safety, we'll just commit and let you review
          echo "Skills found - ready for manual review"

      - name: Commit and push
        if: steps.find.outputs.count > '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add any changes
          git add OPENCODE-SKILLS.md
          git commit -m "docs: auto-sync my skills - $(date +%Y-%m-%d)" || echo "No changes to commit"
          
          # Push to private repo
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skill-list.git HEAD:main

      - name: Sync to public
        if: steps.find.outputs.count > '0'
        run: |
          # Add public remote
          git remote add public https://github.com/timehub-uk/opencode-skills.git
          
          # Push to public repo
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/timehub-uk/opencode-skills.git HEAD:main

      - name: Summary
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- My username: ${{ steps.user.outputs.MY_USER }}" >> $GITHUB_STEP_SUMMARY
          echo "- New skills found: ${{ steps.find.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Synced to public: $([ '${{ steps.find.outputs.count }}' > '0' ] && echo 'Yes' || echo 'No')" >> $GITHUB_STEP_SUMMARY
