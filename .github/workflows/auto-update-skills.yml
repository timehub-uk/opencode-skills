name: Auto Update OpenCode Skills
on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:
  repository_dispatch:

jobs:
  update-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup GH CLI
        run: |
          gh auth setup-git
          gh auth status

      - name: Find new skills
        id: find-skills
        run: |
          # Search for recently created skills
          echo "Searching for new skills..." >> $GITHUB_STEP_SUMMARY
          
          # Get skills created after Feb 2026
          gh api search/repositories \
            -q '.items[] | "\(.full_name)|\(.description)|\(.html_url)|\(.language)|\(.stargazers_count)"' \
            --method GET \
            -F q="claude code skills created:>2026-02-01" \
            -F per_page=30 > /tmp/new-skills.txt
          
          # Count new skills
          NEW_COUNT=$(wc -l < /tmp/new-skills.txt)
          echo "Found $NEW_COUNT potential new skills"
          echo "new_skills_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          
          # Show top 5
          head -5 /tmp/new-skills.txt

      - name: Update skills file
        if: steps.find-skills.outputs.new_skills_count > '0'
        run: |
          # This is a placeholder - in production you'd update the markdown file
          echo "Would update skills file with new entries"
          # Example: ./scripts/update-skills.sh
          
      - name: Commit and push
        if: steps.find-skills.outputs.new_skills_count > '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add OPENCODE-SKILLS.md
          git commit -m "docs: auto-update skills list - $(date +%Y-%m-%d)" || echo "No changes to commit"
          
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main

      - name: Summary
        run: |
          echo "## Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- New skills found: ${{ steps.find-skills.outputs.new_skills_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date)" >> $GITHUB_STEP_SUMMARY
